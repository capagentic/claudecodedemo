<template>
    <template if:true={isLoading}>
        <lightning-spinner alternative-text="Loading" variant="brand" size="large">
        </lightning-spinner>
    </template>
    <div class="slds-text-heading_medium">{questionDetails}<lightning-helptext content={question.helpText}
            class="helptext" icon-variant="inverse" if:true={question.helpText}></lightning-helptext>
    </div>
    <br/>
    <br/>
    <!-- Display a payment form -->
    <form id="payment-form" data-id="payment-form" if:false={paymentDone}>
        <div id="payment-element" data-id='payment-element' lwc:dom="manual">

        </div>
        <div class="slds-text-align_left slds-m-vertical_x-small" if:true={validCurrency}>
            <button id="submit" onclick={handleSubmit} type="button">
                <div class="spinner hidden" id="spinner"></div>
                <span id="button-text">Pay now</span>
            </button>
        </div>
    </form>
    <template if:true={paymentDone}>
        <div class="slds-text-heading_medium slds-m-vertical_medium slds-align_absolute-center slds-text-align_center">
            <lightning-icon class="successIcon" icon-name="action:approval" size="small" variant="Warning">
            </lightning-icon><span class="slds-m-horizontal_small">Thank You</span>
        </div>
        <div class="slds-text-heading_medium slds-align_absolute-center slds-text-align_center">{statusMessage}</div>
    </template>
    <br/>
    <br/>
</template>
