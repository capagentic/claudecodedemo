<template>
    <div class="qCard">
        <div class="slds-text-heading_medium">{question.questionDetails}<lightning-helptext
                content={question.helpText} class="helptext" icon-variant="inverse" if:true={question.helpText}></lightning-helptext>
        </div>
        <lightning-input type="text" name="url" class="slds-text-heading_medium" onchange={handleChange}
            value={question.answer} pattern='(([\w]+:)?\/\/)?(([\d\w]|%[a-fA-f\d]{2,2})+(:([\d\w]|%[a-fA-f\d]{2,2})+)?@)?([\d\w][-\d\w]{0,253}[\d\w]\.)+[\w]{2,63}(:[\d]+)?(\/([-+_~.\d\w]|%[a-fA-f\d]{2,2})*)*(\?(&?([-+_~.\d\w]|%[a-fA-f\d]{2,2})=?)*)?(#([-+_~.\d\w]|%[a-fA-f\d]{2,2})*)?'></lightning-input>
    </div>
</template>
