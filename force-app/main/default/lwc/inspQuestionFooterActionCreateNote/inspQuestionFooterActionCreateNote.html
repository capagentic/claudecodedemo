<template>
    <div class="demo-only" >
        <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" 
        aria-modal="true" aria-describedby="modal-content-id-1" 
        class="slds-modal slds-fade-in-open"
        aria-hidden="false">
            <div if:true={isLoading}>
                <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
            </div>
            <lightning-record-edit-form object-api-name="ContentNote" onsubmit={handleSubmit} onsuccess={handleSuccess} 
                record-id={noteId} onload={handleOnLoad}>
                <div class="slds-modal__container absoluteposition">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close" onclick={closeModal}> 
                            <lightning-icon icon-name="utility:close" size="medium"> 
                            </lightning-icon> 
                            <span class="slds-assistive-text">Close</span> 
                        </button> 
                        <h2 id="modal-heading-01" class="slds-text-heading_medium slds-hyphenate">{popupTitle}</h2>
                    </header>

                    <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1">
                            <lightning-input-rich-text value={noteContent} data-fieldname="Content" 
                            onchange={handleChange} name="Content" placeholder="Content" disabled-categories="INSERT_CONTENT, FORMAT_FONT, FORMAT_TEXT, ALIGN_TEXT" 
                            class="slds-m-around_xx-small cTextArea" style="text-align:left;" label="Content" variant="label-hidden" 
                            > </lightning-input-rich-text>

                            <!-- <lightning-textarea name="Content" value={noteContent} data-fieldname="Content" onchange={handleChange}
                                placeholder="Content" label="Content" variant="label-hidden" 
                                class="slds-m-around_xx-small cTextArea"></lightning-textarea> -->

                    </div>

                    <footer class="slds-modal__footer"> 
                        <lightning-button
                            class="slds-m-top_small"
                            label="Cancel"
                            onclick={closeModal}
                        ></lightning-button>
                        <lightning-button class="slds-m-around_x-small" 
                            type="submit" 
                            name="Save" 
                            label="Save" variant="brand"> </lightning-button>
                    </footer>
                </div>
            </lightning-record-edit-form>
        </section>
        <div class="slds-backdrop slds-backdrop_open"></div>
    </div>
</template>
