<template>
    <div class="qCard">
        <div class="slds-text-heading_medium">{question.questionDetails}<lightning-helptext
                content={question.helpText} class="helptext" icon-variant="inverse" if:true={question.helpText}></lightning-helptext>
        </div>
        <lightning-input type="number" name="percentage" class="slds-text-heading_medium" onchange={handleChange}
            value={question.answer} max="100" step="0.01" formatter="percent-fixed"></lightning-input>
    </div>
</template>
