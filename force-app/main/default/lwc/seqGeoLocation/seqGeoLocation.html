<template>
    <div class="qCard">
        <div class="slds-text-heading_medium">{question.questionDetails}<lightning-helptext
                content={question.helpText} class="helptext" icon-variant="inverse" if:true={question.helpText}></lightning-helptext>
        </div>
        <lightning-map map-markers={mapMarkers} zoom-level="12" class="googleMap"></lightning-map>
        <div if:true={address} class="slds-text-heading_medium slds-m-vertical_small">{address}
        </div>

    </div>

</template>
