    <div if:true={isLoading}>
        <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
    </div>
    <lightning-modal-header label="New Task">
    </lightning-modal-header>
    <lightning-modal-body>
        <div class="slds-grid slds-gutters slds-wrap">
            <div class="slds-p-around_xxx-small slds-text-align_left slds-col slds-size_1-of-1 slds-medium-size_1-of-1 slds-large-size_1-of-1">
                <label class="slds-form-element__label" for="Subjectfield">
                    <abbr class="requiredclass">*</abbr>
                    <span>Subject</span>
                </label>
                <lightning-input id="Subjectfield" type="text" value={taskRecord.Subject} data-fieldname="Subject" 
                    onchange={handleChange} name="Subject" placeholder=""
                    style="text-align:left;" label="Subject" 
                    variant="label-hidden" required="true"> </lightning-input>
            </div>

            <div class="slds-p-around_xxx-small slds-text-align_left slds-col slds-size_1-of-1 slds-medium-size_1-of-1 slds-large-size_1-of-1">
                <label class="slds-form-element__label" for="Descriptionfield">Comments</label>
                <lightning-textarea name="Description" placeholder="" 
                    value={taskRecord.Description} data-fieldname="Description" onchange={handleChange} 
                    style="text-align:left;" label="Comments" 
                    variant="label-hidden" ></lightning-textarea>
            </div>  
            
            <div class="slds-p-around_xxx-small slds-text-align_left slds-col slds-size_1-of-1 slds-medium-size_1-of-1 slds-large-size_1-of-1">
                <c-record-lookup onrecordselection={recordSelectionHandler} object-api-name="User" lookup-label="Assigned To" 
                    place-holder-text="Search People" data-fieldname="OwnerId" name="OwnerId" icon-name="standard:user" selected-record-id={taskRecord.OwnerId}
                    selected-value={currentUserName}> 

                </c-record-lookup>
            </div>
            
            <div class="slds-p-around_xxx-small slds-text-align_left slds-col slds-size_1-of-1 slds-medium-size_1-of-1 slds-large-size_1-of-1 slds-grid slds-gutters slds-wrap">
                <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-2 slds-large-size_1-of-2">
                    <label class="slds-form-element__label" for="DueDatefield">Due Date</label>
                    <lightning-input id="DueDatefield" type="date" name="ActivityDate" placeholder="" 
                        value={taskRecord.ActivityDate} data-fieldname="ActivityDate" onchange={handleChange} 
                        style="text-align:left;" label="Due Date" 
                        variant="label-hidden"> </lightning-input>
                </div>  
                <div class="slds-col slds-size_1-of-2 slds-medium-size_1-of-2 slds-large-size_1-of-2">
                    <div class="slds-grid slds-gutters slds-wrap">
                        <div class="slds-p-around_xxx-small slds-text-align_left slds-col slds-size_1-of-1 slds-medium-size_1-of-1 slds-large-size_1-of-1">
                            <div class="slds-form-element">
                                <label class="slds-form-element__label">
                                    <abbr class="requiredclass">*</abbr>
                                    <span>Priority</span>
                                </label>
                                <div class="slds-form-element__control">
                                    <div class="slds-select_container">
                                        <select class="slds-select" 
                                                name="Priority" 
                                                data-fieldname="Priority" onchange={handleChange} 
                                                style="text-align:left;height: 45px;"
                                                required>
                                            <option value="">Select</option>
                                            <template for:each={priorityOptions} for:item="option">
                                                <option key={option.value} class="uiInputSelectOption" value={option.value}>{option.label}</option>
                                            </template>
                                        </select>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </lightning-modal-body>
    <lightning-modal-footer>
        <lightning-button
            class="slds-m-top_small"
            label="Cancel"
            onclick={closeModal}>
        </lightning-button>
        <lightning-button class="slds-m-around_x-small" 
            type="submit" 
            name="Save" 
            label="Save" 
            onclick={handleSubmit} variant="brand"
            disabled={ispreviewshown}> 
        </lightning-button>
    </lightning-modal-footer>
</template>
