<template>
    <lightning-card title="Audio Recorder">
        <div class="slds-m-around_medium">
            <lightning-button label="Start Recording" onclick={startRecording} variant="brand"
                class="slds-m-bottom_small" disabled={readOnly}>

            </lightning-button>
            <lightning-button label="Stop Recording" onclick={stopRecording} variant="destructive" disabled={readOnly}>

            </lightning-button>
        </div>
        <audio controls="controls" class="slds-m-around_medium" lwc:dom="manual"></audio>
        <!-- onload={loadAudio} -->
    </lightning-card>
</template>
