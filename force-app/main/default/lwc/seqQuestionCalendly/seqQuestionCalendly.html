<template>
    <div class="qCard">
        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading" variant="brand" size="large">
            </lightning-spinner>
        </template>
        <div class="slds-text-heading_medium">{question.questionDetails}<lightning-helptext
                content={question.helpText} class="helptext" icon-variant="inverse" if:true={question.helpText}></lightning-helptext>
        </div>
        <!-- <div id="calendlyDiv" class="calendlyDiv" lwc:dom="manual" style="height: 500px;"></div> -->
        <div class="calendly-inline-widget calendlyDiv calendlyborder slds-m-vertical_large" style="min-width:320px;height:480px;" data-auto-load="false" if:false={eventbooked}></div>
        <div if:true={eventbooked} align="center">
            <div class="slds-text-heading_medium slds-p-vertical_large">You have successfully scheduled a meeting!</div>
        </div>
    </div>
</template>
