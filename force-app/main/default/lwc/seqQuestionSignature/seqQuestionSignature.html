<template>
    
    <div class="qCard">
        <div class="slds-text-heading_medium">{question.questionDetails} <lightning-helptext
            content={question.helpText} class="helptext" icon-variant="inverse" if:true={question.helpText}></lightning-helptext>
        </div>
        <div style="text-align: center; " class="outerDiv">
            <canvas class="signature-pad canvasBorder" lwc:dom="manual"></canvas>
           
            <div class="slds-var-m-top_small">
                <lightning-button variant="destructive" label="Clear" title="Clear" 
                    onclick={handleClearClick}></lightning-button>
            </div>
        </div>
    </div>
</template>
