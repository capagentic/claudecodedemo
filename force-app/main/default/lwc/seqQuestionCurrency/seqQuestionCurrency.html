<template>
    <div class="qCard">
        <div class="slds-text-heading_medium">{question.questionDetails}<lightning-helptext
                content={question.helpText} class="helptext" icon-variant="inverse" if:true={question.helpText}></lightning-helptext>
        </div>
        <lightning-input type="number" name="currency" class="slds-text-heading_medium" onchange={handleChange}
            value={question.answer} min="0" formatter="currency" step=".01" accuracy="2"></lightning-input>
    </div>
</template>
