<template>
    <lightning-card>
        <section class="slds-card slds-card_boundary">
            <div slot="title" class="slds-card__header slds-text-heading_small">
                {sectionTitle}
            </div>
            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading" variant="brand" size="large">
                </lightning-spinner>
            </template>
            <div class="custom-box slds-box slds-card__body slds-card__body_inner slds-m-horizontal_small fkbackgroundcolor slds-scrollable_y requiredheight slds-p-around_none slds-col slds-grid slds-grid_vertical slds-nowrap">
                <div class="slds-modal__content slds-grid slds-nowrap" id="modal-content-id-1">
                    <div class="slds-col slds-grid slds-grid_vertical slds-nowrap">
                        <div class="slds-p-vertical_x-small slds-p-horizontal_large slds-shrink-none slds-theme_shade">
                            <!-- <div class="slds-form-element">
                                <label class="slds-form-element__label slds-assistive-text" for="combobox-unique-id-21">Search</label>
                                <div class="slds-form-element__control">
                                    <div class="slds-combobox_container">
                                        <div class="slds-combobox slds-dropdown-trigger slds-dropdown-trigger_click" aria-expanded="false" aria-haspopup="listbox" role="combobox">
                                            <div class="slds-combobox__form-element slds-input-has-icon slds-input-has-icon_right" role="none">
                                                <input type="text" class="slds-input slds-combobox__input" id="combobox-unique-id-21" aria-autocomplete="list" autocomplete="off" role="textbox" placeholder={searchPlaceHolderText}
                                                    onkeyup={handleSearch}/>
                                                <span class="slds-icon_container slds-icon-utility-search slds-input__icon slds-input__icon_right">
                                                    <lightning-icon icon-name="utility:search" alternative-text="Search" title="Search" size="x-small"></lightning-icon>
                                                </span>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                            </div> -->
                            <div class="slds-form-element">
                                <c-record-lookup lookup-label={searchPlaceHolderText}
                                    onrecordselection={handleSearch} object-api-name="Contact" icon-name="standard:contact">
                                </c-record-lookup>
                
                            </div>
                            <div class="slds-text-title slds-m-top_x-small" aria-live="polite">{selectedRecordsCount} Contact(s) Selected</div>
                        </div>
                        <div class="slds-scrollable slds-grow">
                            <div class="slds-scrollable_none">
                                <table aria-multiselectable="true" class="slds-table slds-no-row-hover slds-table_bordered slds-table_fixed-layout slds-table_resizable-cols nobottomBorder" role="grid" aria-label="Available record list">
                                    <thead>
                                        <tr class="slds-line-height_reset">
                                            <th class="thinbottomBorder" scope="col" style="width:3.75rem;">
                                                <a class="slds-th__action slds-text-link_reset" href="#" role="button" tabindex="-1">
                                                </a>
                                            </th>
                                            <template for:each={columnsToDisplay} for:item='col'>
                                                <th aria-label={col.label} aria-sort="none" class="slds-is-resizable slds-is-sortable thinbottomBorder" scope="col" style="min-width: 10%;" key={col.name}>
                                                    <a class="slds-th__action slds-text-link_reset" href="#" role="button" tabindex="-1">
                                                        <div class="slds-grid slds-grid_vertical-align-center slds-has-flexi-truncate">
                                                            <span class="slds-truncate" title={col.label}>{col.label}</span>
                                                        </div>
                                                    </a>
                                                    <div class="slds-resizable">
                                                        <input type="range" aria-label="column width" class="slds-resizable__input slds-assistive-text" id={col.label} max="1000" min="20" tabindex="-1" />
                                                        <span class="slds-resizable__handle">
                                                            <span class="slds-resizable__divider"></span>
                                                        </span>
                                                    </div>
                                                </th>
                                            </template>
                                        </tr>
                                    </thead>
                                    <tbody class="slds-scrollable_y maxheight">
                                        <template for:each={recordsToDisplay} for:item="rec">
                                            <tr aria-selected={rec.isselected} class={rec.rowclass} key={rec.Id}>
                                                <td class="slds-text-align_right" role="gridcell" tabindex="0">
                                                    <label class="slds-checkbox-button slds-checkbox-button_is-checked" for={rec.Id}>
                                                        <input type="checkbox" class="slds-assistive-text" id={rec.Id} value={rec.Id} tabindex="-1" checked="" onclick={selectrecord} name={rec.Id}/>
                                                        <template  if:true={rec.isselected}>
                                                            <span class="slds-icon_container slds-icon-utility-check slds-current-color" title="">
                                                                <lightning-icon icon-name="utility:check" alternative-text="Check" title="Check" size="x-small"></lightning-icon>
                                                                <span class="slds-assistive-text">Selected Record</span>
                                                            </span>
                                                        </template>
                                                        <template  if:false={rec.isselected}>
                                                            <span class="slds-icon_container slds-icon-utility-add slds-current-color" title="">
                                                                <lightning-icon icon-name="utility:add" alternative-text="Add" title="Add" size="x-small"></lightning-icon>
                                                                <span class="slds-assistive-text">Add Record</span>
                                                            </span>
                                                        </template>
                                                    </label>
                                                </td>
                                                
                                                <td scope="row">
                                                    <div class="slds-truncate" title={rec.Name}>{rec.Name}</div>
                                                </td>
                                                <td role="gridcell">
                                                    <div class="slds-truncate" title={rec.Account.Name}>{rec.Account.Name}</div>
                                                </td>
                                                <td role="gridcell">
                                                    <div class="slds-truncate" title={rec.Title}>{rec.Title}</div>
                                                </td>
                                                <td role="gridcell">
                                                    <div class="slds-truncate" title={rec.Email}>{rec.Email}</div>
                                                </td>
                                                <td role="gridcell">
                                                    <div class="slds-truncate" title={rec.MobilePhone}>{rec.MobilePhone}</div>
                                                </td>
                                            </tr>
                                        </template>
                                        <!-- <template if:true={norecordsfound}>
                                            <div class="slds-text-title slds-p-around_small" aria-live="polite">
                                                No record(s) found
                                            </div>
                                        </template> -->
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </lightning-card>
</template>
