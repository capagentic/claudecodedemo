<template>
    <template if:true={showFlow}>
        <lightning-flow
            flow-api-name={flowname}
            flow-input-variables={inputVariables}
            onstatuschange={handleStatusChange}
            flow-finish-behavior="NONE">
        </lightning-flow>
    </template>
    <template if:false={showFlow} >
        The Flow is already completed.
    </template>
    
    <template if:false={flowname}>
        Please select required Flow to render.
    </template>
</template>
