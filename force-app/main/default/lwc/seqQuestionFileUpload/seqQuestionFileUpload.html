<template>
    <div class="qCard">
        <div class="slds-text-heading_medium">{question.questionDetails}<lightning-helptext
                content={question.helpText} class="helptext" icon-variant="inverse" if:true={question.helpText}></lightning-helptext>
        </div>

        <div class="fileUploadContainer">
            <lightning-input label="" name="file uploader" onchange={handleChange} type="file" multiple>
            </lightning-input>
            <div class="slds-m-vertical_medium slds-text-heading_medium">
                <template if:true={fileName}>
                    {fileName} &nbsp; &nbsp; {fileSize}
                </template>
            </div>
        </div>

    </div>
    <div if:true={isLoading}>
        <lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
    </div>
    <!-- <div class="slds-m-around_small">
        <lightning-button variant="success" label="Upload" title="Upload" onclick={saveFile}></lightning-button>
    </div> -->
</template>
