<template>
    <ul class="radioButtonGroup">
        <template for:each={options} for:item="option">
            <li key={option.value}>
                <div>
                    <input type="radio" id={option.value} name={option.questionId} onclick={handleOptionSelected}
                        value={option.value} checked={option.checked} required={question.answerrequired}
                        disabled={readOnly} style={option.styleAtt} />
                    <label for={option.value} style={option.styleAtt}>{option.label} <span class="btnIcon"><template
                                lwc:if={option.showBtnIcon}><lightning-button-icon variant="bare"
                                    icon-name="utility:flow" class="questionActionIcon"
                                    size="small"></lightning-button-icon>
                            </template></span></label>
                </div>
            </li>
        </template>
    </ul>
</template>
