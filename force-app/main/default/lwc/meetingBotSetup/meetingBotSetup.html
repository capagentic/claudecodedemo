<template>

    <div class="slds-m-vertical_x-small">
        <lightning-input type="text" label="Enter the meeting url" onchange={handleMeetingUrlChange}></lightning-input>
    </div>

    <div class="slds-m-vertical_x-small">
        <lightning-button variant="brand" label="Invite bot to the meeting" title="Invite bot to the meeting"
            onclick={handleInvite} class="slds-m-left_x-small"></lightning-button>
    </div>

    <div class="slds-m-vertical_x-small">
        <lightning-input type="text" label="Bot ID" value={botId} onchange={handleBotIdChange}></lightning-input>
    </div>

    <div class="slds-m-vertical_x-small">
        <lightning-button variant="brand" label="Get meeting transpript" title="Get meeting transpript"
            onclick={handleGetTranscript} class="slds-m-left_x-small"></lightning-button>
    </div>

    <template if:true={transcript}>
        <template for:each={transcript} for:item="s">
            <p key={s.speaker}><strong>Speaker: {s.speaker}</strong></p>

            <template for:each={s.words} for:item="w">
                <div class="slds-m-vertical_x-small" key={s.text}>
                    <p>{w.text}</p>
                    <p>From {w.start_timestamp} - {w.end_timestamp}</p>
                </div>
            </template>
        </template>
    </template>

</template>
