<template>
    <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true"
        aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
        <div class="slds-modal__container">
            <header class="slds-modal__header">
                <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" title="Close"
                    onclick={handleCancel}>
                    <lightning-icon icon-name="utility:close" alternative-text="close" variant="inverse"
                        size="small"></lightning-icon>
                    <span class="slds-assistive-text">Close</span>
                </button>
                <h2 id="modal-heading-01" class="slds-text-heading_medium slds-hyphenate">Picklist Value Options</h2>
            </header>

            <div class="slds-modal__content slds-p-around_medium" id="modal-content-id-1">

                <template if:true={errormessage}>
                    <span class="slds-text-color_error">{errormessage}</span>
                </template>
                <template for:each={currentquestion.Kinetics__Values__c} for:item="option">
                    <lightning-layout multiple-rows key={option.value} horizontal-align="space">
                        <lightning-layout-item size="12" small-device-size="5">
                            <label class="slds-form-element__label" for="Kinetics__Status__c">Picklist Value</label>
                            <input data-name="value" data-optionnumber={option.optionno} value={option.value}
                                onchange={handleOptionInputChange} label="Picklist Value" placeholder="Add Option"
                                variant="label-stacked" disabled={isPassFailQuestion} class="slds-input"></input>
                        </lightning-layout-item>
                        <!-- <lightning-layout-item size="12" small-device-size="1">

                        </lightning-layout-item> -->
                        <lightning-layout-item size="12" small-device-size="3" class="colorPickerContainer">
                            <c-avonni-color-picker class="colorPicker" label="Choose Color"
                                onchange={handleOptionInputChange} value={option.color}
                                data-optionnumber={option.optionno} data-name="color" hide-color-input
                                menu-alignment="auto" colors={colors}></c-avonni-color-picker>
                        </lightning-layout-item>
                        <lightning-layout-item size="12" small-device-size="2">
                            <lightning-input type="number" data-name="score" data-optionnumber={option.optionno}
                                label="Score" value={option.score} onchange={handleOptionInputChange}
                                class="slds-align--absolute-center" variant="label-stacked"></lightning-input>
                        </lightning-layout-item>
                        <lightning-layout-item size="12" small-device-size="2" class="slds-p-top_small">
                            <template if:false={isPassFailQuestion}>
                                <lightning-icon icon-name="utility:copy" alternative-text="Clone" title="Clone"
                                    class="optionDeleteIcon slds-m-horizontal_small" onclick={cloneOption}
                                    size="x-small" data-optionnumber={option.optionno}></lightning-icon>
                                <lightning-icon icon-name="utility:delete" alternative-text="Delete" title="Delete"
                                    class="optionDeleteIcon" onclick={deleteOption} size="x-small"
                                    data-optionnumber={option.optionno}></lightning-icon>

                            </template>
                        </lightning-layout-item>
                    </lightning-layout>
                </template>
                <template if:false={isPassFailQuestion}>
                    <lightning-button variant="brand-outline" label="Add Option" title="Add Option"
                        onclick={addOptionInList} class="slds-m-left_x-small"
                        icon-name="utility:add"></lightning-button>
                </template>
            </div>



            <footer class="slds-modal__footer">
                <lightning-button label="Cancel" onclick={handleCancel}
                    class="slds-p-around_xxx-small"></lightning-button>
                <lightning-button label="Save" onclick={handleSave} class="slds-p-around_xxx-small"></lightning-button>
            </footer>
        </div>
    </section>
    <div class="slds-backdrop slds-backdrop_open"></div>
    <div class="externalstyle"></div>
</template>
